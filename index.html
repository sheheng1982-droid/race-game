<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>KI & Traffic Insider Game</title>
    <style>
        /* Сброс отступов и жесткая фиксация экрана от скролла */
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #0b0e14;
            color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* Главный мобильный контейнер */
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 15px;
            box-sizing: border-box;
        }

        /* Текст задания сверху */
        .headline {
            font-size: 15px;
            font-weight: bold;
            text-align: center;
            color: #00e5ff;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.4);
            max-width: 90%;
            line-height: 1.3;
        }

        /* Округлая плашка таймера */
        .timer-badge {
            background-color: #00e5ff;
            color: #000000;
            font-weight: bold;
            padding: 6px 24px;
            border-radius: 20px;
            font-size: 16px;
            margin-bottom: 15px;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
        }

        /* ИСПРАВЛЕНО: Идеальное квадратное игровое поле под телефоны */
        .canvas-container {
            width: 90%;
            max-width: 380px;
            aspect-ratio: 1 / 1;
            position: relative;
            border: 3px solid #00e5ff;
            border-radius: 20px;
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.25);
            background-color: #090d14;
            overflow: hidden;
        }

        #gameCanvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }

        /* Начальный экран «Bist du bereit?» */
        .start-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(11, 14, 20, 0.95);
            z-index: 10;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        .start-title {
            color: #00e5ff;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .start-desc {
            font-size: 13px;
            line-height: 1.4;
            color: #cccccc;
            margin-bottom: 20px;
            max-width: 260px;
        }

        .start-btn {
            background: linear-gradient(90deg, #00ff87 0%, #60efff 100%);
            color: #000000;
            border: none;
            padding: 12px 35px;
            font-size: 15px;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0, 255, 135, 0.3);
        }

        /* ИСПРАВЛЕНО: Всплывающее окно победы с вашей личной ссылкой */
        .popup-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 7, 10, 0.95);
            z-index: 20;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            padding: 20px;
        }

        .popup-content {
            background: linear-gradient(145deg, #181d26, #11151c);
            border: 2px solid #00e5ff;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.3);
            padding: 25px 20px;
            border-radius: 20px;
            text-align: center;
            width: 100%;
            max-width: 320px;
            box-sizing: border-box;
        }

        .popup-title {
            font-size: 24px;
            color: #ffd700;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .popup-prize {
            font-size: 15px;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.03);
            padding: 12px;
            border-radius: 10px;
            border: 1px dashed rgba(0, 229, 255, 0.4);
            line-height: 1.4;
        }

        /* Кнопка перенаправления сразу к Александру в диалог */
        .popup-btn {
            display: block;
            background: linear-gradient(90deg, #2ecc71, #27ae60);
            color: #000000 !important;
            padding: 15px 20px;
            font-size: 13px;
            font-weight: 900;
            text-decoration: none;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Широкие удобные кнопки управления LINKS / RECHTS */
        .controls-container {
            display: flex;
            width: 90%;
            max-width: 380px;
            gap: 15px;
            margin-top: 20px;
        }

        .control-btn {
            flex: 1;
            background: #00e5ff;
            border: none;
            color: #000000;
            padding: 15px 0;
            font-weight: bold;
            font-size: 15px;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 229, 255, 0.3);
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
        }

        .control-btn:active {
            background: #00b2cc;
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="headline">Weiche den Hindernissen aus und fahre ins Ziel ein!</div>
        <div id="timerDisplay" class="timer-badge">Zeit: 10.0s</div>

        <div class="canvas-container">
            <!-- Экран «Bist du bereit?» -->
            <div id="startOverlay" class="start-overlay">
                <div class="start-title">Bist du bereit? 🏎</div>
                <div class="start-desc">Weiche 10 Sekunden lang den Hindernissen aus, um deinen Bonus freizuschalten!</div>
                <button id="startBtn" class="start-btn">SPIEL STARTEN</button>
            </div>
            
            <!-- ИСПРАВЛЕНО: Окно выигрыша ведет в диалог к @AlexanderCryptoAl -->
            <div id="popupOverlay" class="popup-overlay">
                <div class="popup-content">
                    <div class="popup-title">🎉 Glückwunsch!</div>
                    <div class="popup-prize">
                        Ihr Gewinn:<br>
                        <strong style="color:#ffd700; font-size:20px;">20% ERSTEINZAHLUNGSBONUS</strong><br><br>
                        <span style="font-size:12px; color:#ff4d4d;">Der Gutschein läuft ab in: 09:59</span>
                    </div>
                    <a href="https://t.me/AlexanderCryptoAl" class="popup-btn">RABATT IN TELEGRAM SICHERN</a>
                </div>
            </div>
            
            <!-- Матрица холста квадратная 400x400 -->
            <canvas id="gameCanvas" width="400" height="400"></canvas>
        </div>

        <div class="controls-container">
            <button id="btnLeft" class="control-btn">◀ LINKS</button>
            <button id="btnRight" class="control-btn">RECHTS ▶</button>
        </div>
    </div>

        const popupOverlay = document.getElementById('popupOverlay');
        const startBtn = document.getElementById('startBtn');
        const timerDisplay = document.getElementById('timerDisplay');
        const btnLeft = document.getElementById('btnLeft');
        const btnRight = document.getElementById('btnRight');

        let gameActive = false;
        let timeLeft = 10.0;
        
        // Размеры и позиция спортивной машинки игрока
        let carX = 175;

        const carWidth = 50;
        const carHeight = 85;

        // Массив препятствий
        let obstacles = [];
        let obstacleTimer = 0;
        let lineY = 0;

        startBtn.addEventListener('click', () => {
            startOverlay.style.display = 'none';
            gameActive = true;
            timeLeft = 10.0;
            obstacles = [];
            carX = 175;
            startGameLoop();
        });

        // Отслеживание кликов по кнопкам LINKS / RECHTS
        btnLeft.addEventListener('pointerdown', () => { if(gameActive && carX > 40) carX -= 65; });
        btnRight.addEventListener('pointerdown', () => { if(gameActive && carX < 310) carX += 65; });
