<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>KI & Traffic Insider Game</title>
    <style>
        /* Сброс базовых отступов и фиксация экрана от скролла */
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #0b0e14;
            color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* Главный контейнер на весь экран */
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 15px;
            box-sizing: border-box;
        }

        /* Текст заголовка сверху */
        .headline {
            font-size: 15px;
            font-weight: bold;
            text-align: center;
            color: #00e5ff;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.4);
            max-width: 90%;
            line-height: 1.3;
        }

        /* Плашка таймера */
        .timer-badge {
            background-color: #00e5ff;
            color: #000000;
            font-weight: bold;
            padding: 6px 24px;
            border-radius: 20px;
            font-size: 16px;
            margin-bottom: 15px;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
        }

        /* ИСПРАВЛЕНО: Квадратное адаптивное игровое поле */
        .canvas-container {
            width: 90%;
            max-width: 380px;
            aspect-ratio: 1 / 1; /* Жестко делает контейнер идеальным квадратом */
            position: relative;
            border: 3px solid #00e5ff;
            border-radius: 20px;
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.25);
            background-color: #090d14;
            overflow: hidden;
        }

        #gameCanvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }

        /* Экран старта внутри игрового поля */
        .start-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(11, 14, 20, 0.95);
            z-index: 10;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        .start-title {
            color: #00e5ff;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .start-desc {
            font-size: 13px;
            line-height: 1.4;
            color: #cccccc;
            margin-bottom: 20px;
            max-width: 260px;
        }

        .start-btn {
            background: linear-gradient(90deg, #00ff87 0%, #60efff 100%);
            color: #000000;
            border: none;
            padding: 12px 35px;
            font-size: 15px;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0, 255, 135, 0.3);
        }

        /* ИСПРАВЛЕНО: Крупные удобные кнопки управления внизу экрана */
        .controls-container {
            display: flex;
            width: 90%;
            max-width: 380px;
            gap: 15px;
            margin-top: 20px;
        }

        .control-btn {
            flex: 1;
            background: #00e5ff;
            border: none;
            color: #000000;
            padding: 15px 0;
            font-weight: bold;
            font-size: 15px;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 229, 255, 0.3);
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: no;
            -webkit-user-select: none;
        }

        .control-btn:active {
            background: #00b2cc;
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="game-container">
        <!-- Текст и таймер -->
        <div class="headline">Weiche den Hindernissen aus und fahre ins Ziel ein!</div>
        <div id="timerDisplay" class="timer-badge">Zeit: 10.0s</div>

        <!-- Контейнер с квадратной игрой -->
        <div class="canvas-container">
            <!-- Экран старта (исчезнет при клике) -->
            <div id="startOverlay" class="start-overlay">
                <div class="start-title">Bist du bereit? 🏎</div>
                <div class="start-desc">Weiche 10 Sekunden lang den Hindernissen aus, um deinen Bonus freizuschalten!</div>
                <button id="startBtn" class="start-btn">SPIEL STARTEN</button>
            </div>
            
            <!-- Игровой холст (матрица теперь тоже квадратная 400x400) -->
            <canvas id="gameCanvas" width="400" height="400"></canvas>
        </div>

        <!-- Кнопки управления LINKS и RECHTS -->
        <div class="controls-container">
            <button id="btnLeft" class="control-btn">◀ LINKS</button>
            <button id="btnRight" class="control-btn">RECHTS ▶</button>
        </div>
    </div>

    <script>
        // Ниже встроена базовая логика игры для проверки физики и адаптива
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startOverlay = document.getElementById('startOverlay');
        const startBtn = document.getElementById('startBtn');
        const timerDisplay = document.getElementById('timerDisplay');
        const btnLeft = document.getElementById('btnLeft');
        const btnRight = document.getElementById('btnRight');

        let gameActive = false;
        let timeLeft = 10.0;
        let carX = 175; // Начальная позиция машинки по центру (холст 400px)
        const carY = 300;
        const carWidth = 50;
        const carHeight = 80;

        // Обработка старта игры
        startBtn.addEventListener('click', () => {
            startOverlay.style.display = 'none';
            gameActive = true;
            startGameLoop();
        });

        // Кнопки управления (Изменяют координату X машинки)
        btnLeft.addEventListener('pointerdown', () => { if(gameActive && carX > 20) carX -= 35; });
        btnRight.addEventListener('pointerdown', () => { if(gameActive && carX < 330) carX += 35; });

        // Простой цикл отрисовки для демонстрации
        function startGameLoop() {
            if (!gameActive) return;

            // Очистка и прорисовка фона дороги
            ctx.fillStyle = '#090d14';
            ctx.fillRect(0, 0, 400, 400);

            // Разделительная линия
            ctx.strokeStyle = '#ffffff';
            ctx.setLineDash([20, 20]);
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(200, 0);
            ctx.lineTo(200, 400);
            ctx.stroke();

            // Машинка (Голубой прямоугольник вместо графики для примера)
            ctx.fillStyle = '#00e5ff';
            ctx.fillRect(carX, carY, carWidth, carHeight);

            // Обратный отсчет таймера
            if (timeLeft > 0) {
                timeLeft -= 0.02;
                timerDisplay.innerText = `Zeit: ${Math.max(0, timeLeft).toFixed(1)}s`;
                requestAnimationFrame(startGameLoop);
            } else {
                gameActive = false;
                timerDisplay.innerText = "Ziel erreicht! 🎉";
                // Сюда можно вписать перенаправление или открытие попапа с бонусом
            }
        }
    </script>
</body>
</html>
