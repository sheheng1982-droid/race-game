<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>Auto Spiel</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: #0b0b0f;
  font-family: Arial, sans-serif;
}

#ui {
  position: absolute;
  width: 100%;
  text-align: center;
  top: 20px;
  color: white;
  z-index: 10;
}

canvas {
  display: block;
}

button {
  padding: 14px 22px;
  border: none;
  border-radius: 12px;
  font-size: 18px;
  cursor: pointer;
}

#startBtn {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  background: white;
}

.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
  z-index: 20;
  display: none;
  text-align: center;
  padding: 20px;
}

.overlay button {
  margin-top: 10px;
}
</style>
</head>

<body>

<div id="ui">
  <h2>🚗 Auto Spiel</h2>
  <div id="timer">10</div>
</div>

<button id="startBtn">SPIEL STARTEN</button>

<div id="gameOver" class="overlay">
  <h1>💥 Spiel vorbei!</h1>
  <p>Du hast ein Hindernis getroffen.</p>
  <button onclick="restart()">Neu starten</button>
</div>

<div id="win" class="overlay">
  <h1>🎉 Glückwunsch!</h1>
  <p id="bonusText"></p>
  <button onclick="window.open('https://t.me/AlexanderCryptoAl')">Zum Kanal</button>
  <button onclick="window.open('https://t.me/+KnLzkr7tZftmZDEx')">Chat öffnen</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let car = { x: canvas.width/2, y: canvas.height - 120, size: 40 };
let obstacles = [];
let running = false;
let timeLeft = 10;
let gameInterval;

function drawCar() {
  ctx.fillStyle = "red";
  ctx.fillRect(car.x - 15, car.y - 25, 30, 50);

  // top-down details
  ctx.fillStyle = "black";
  ctx.fillRect(car.x - 10, car.y - 10, 20, 20);
}

function spawnObstacle() {
  const lane = Math.random() * (canvas.width - 50);
  obstacles.push({ x: lane, y: -50, size: 40 });
}

function drawObstacles() {
  ctx.fillStyle = "lime";
  obstacles.forEach(o => {
    o.y += 5;
    ctx.fillRect(o.x, o.y, o.size, o.size);

    if (
      Math.abs(o.x - car.x) < 35 &&
      Math.abs(o.y - car.y) < 35
    ) {
      endGame();
    }
  });
}

function loop() {
  if (!running) return;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  drawCar();
  drawObstacles();

  requestAnimationFrame(loop);
}

function startGame() {
  running = true;
  timeLeft = 10;
  obstacles = [];

  document.getElementById("startBtn").style.display = "none";

  gameInterval = setInterval(() => {
    timeLeft--;
    document.getElementById("timer").innerText = timeLeft;

    if (timeLeft <= 0) winGame();
  }, 1000);

  setInterval(spawnObstacle, 800);

  loop();
}

function endGame() {
  running = false;
  document.getElementById("gameOver").style.display = "flex";
}

function restart() {
  location.reload();
}

function winGame() {
  running = false;

  const bonus = Math.random() > 0.5 ? "15%" : "20%";
  document.getElementById("bonusText").innerText =
    "Dein Willkommensbonus: " + bonus;

  document.getElementById("win").style.display = "flex";
}

// TAP CONTROL (mobile)
document.addEventListener("touchstart", (e) => {
  if (!running) return;

  const x = e.touches[0].clientX;

  if (x < window.innerWidth / 2) {
    car.x -= 40;
  } else {
    car.x += 40;
  }

  // bounds
  if (car.x < 30) car.x = 30;
  if (car.x > canvas.width - 30) car.x = canvas.width - 30;
});

document.getElementById("startBtn").onclick = startGame;
</script>

</body>
</html>
