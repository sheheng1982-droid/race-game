<!-- 1. ПОДКЛЮЧАЕМ ОФИЦИАЛЬНУЮ БИБЛИОТЕКУ TELEGRAM WEBAPP ДЛЯ СМАРТФОНОВ -->
<script src="https://telegram.org"></script>

<div class="race-wrapper">
  <div class="race-title">Weiche den Hindernissen aus und fahre ins Ziel ein!</div>
  <div class="race-timer">Zeit: <span id="timerText">10.0</span>s</div>
  
  <div class="race-container" id="raceArea">
    <!-- Динамическая разметка дороги -->
    <div class="road-lines" id="roadLines"></div>
    
    <!-- Стартовый экран-заставка -->
    <div class="start-overlay" id="startScreen">
      <h2>Bist du bereit? 🏎️</h2>
      <p>Weiche 10 Sekunden lang den Hindernissen aus, um deinen Bonus freizuschalten!</p>
      <button class="start-game-btn" id="startBtn">SPIEL STARTEN</button>
    </div>

    <!-- Реалистичный спортивный болид (вид строго сверху) -->
    <div class="car-topview" id="heroCar">
      <div class="car-shadow"></div>
      <div class="car-body">
        <div class="racing-stripes"></div>
        <div class="car-cockpit">
          <div class="windshield"></div>
          <div class="driver-helmet"></div>
        </div>
        <div class="spoiler-front-wing"></div>
        <div class="spoiler-rear-wing"></div>
        <div class="wheel-formula f-l"></div>
        <div class="wheel-formula f-r"></div>
        <div class="wheel-formula b-l"></div>
        <div class="wheel-formula b-r"></div>
        <div class="exhaust-pipes ext-l"></div>
        <div class="exhaust-pipes ext-r"></div>
      </div>
    </div>
  </div>
  <div class="race-controls">
    <button class="race-btn" id="leftBtn">◀ LINKS</button>
    <button class="race-btn" id="rightBtn">RECHTS ▶</button>
  </div>
</div>

<div class="modal-overlay" id="raceModal">
  <div class="modal-box">
    <h3>Ziel erreicht! 🏆</h3>
    <p>Ihr Gewinn: <strong id="racePrizeText" style="color:#00f2fe; font-size:20px; display:block; margin-top:5px; text-shadow: 0 0 10px rgba(0,242,254,0.5);"></strong></p>
    <p class="timer">Der Gutschein läuft ab in: <span id="raceCountdown">15:00</span></p>
    <!-- Чистая кнопка без жестко вбитых юзернеймов внутри текста -->
    <a href="#" id="tgFinalLink" class="tg-redirect-btn">RABATT IN TELEGRAM SICHERN</a>
  </div>
</div>

<style>
html, body { touch-action: manipulation; -webkit-text-size-adjust: 100%; overscroll-behavior-y: contain; }
.race-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Segoe UI', Roboto, sans-serif; padding: 20px 10px; background: #070714; color: #fff; min-height: 85vh; box-sizing: border-box; user-select: none; -webkit-user-select: none; touch-action: none; }
.race-title { font-size: 16px; font-weight: bold; margin-bottom: 15px; text-align: center; max-width: 90%; color: #00f2fe; text-shadow: 0 0 10px #00f2fe; line-height: 1.4; }
.race-timer { font-size: 22px; font-weight: bold; margin-bottom: 15px; background: linear-gradient(135deg, #00f2fe, #4facfe); color: #070714; padding: 6px 25px; border-radius: 20px; box-shadow: 0 0 15px rgba(0, 242, 254, 0.5); }
.race-container { position: relative; width: 100%; max-width: 300px; height: 380px; background: #1a1a2e; border: 4px solid #4facfe; border-radius: 12px; overflow: hidden; box-shadow: 0 0 25px rgba(79, 172, 254, 0.3); }
/* Анимация трассы */
.road-lines { position: absolute; width: 100%; height: 200%; top: -100%; left: 0; background-image: linear-gradient(to bottom, transparent 0%, transparent 50%, #3a3a5c 50%, #3a3a5c 100%); background-size: 10px 40px; background-repeat: repeat-y; background-position: center; z-index: 1; }
.road-lines.moving { animation: scrollRoad 0.4s linear infinite; }
@keyframes scrollRoad { 0% { transform: translateY(0); } 100% { transform: translateY(40px); } }
.start-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(7, 7, 20, 0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; padding: 20px; text-align: center; box-sizing: border-box; }
.start-overlay h2 { font-size: 24px; margin-bottom: 10px; color: #00f2fe; text-shadow: 0 0 8px #00f2fe; }
.start-overlay p { font-size: 14px; color: #ccc; line-height: 1.5; margin-bottom: 25px; }
.start-game-btn { background: #2ed573; color: #fff; border: none; padding: 14px 28px; font-size: 16px; font-weight: bold; border-radius: 25px; cursor: pointer; box-shadow: 0 4px 15px rgba(46, 213, 115, 0.4); transition: 0.2s; }
.obstacle { position: absolute; font-size: 28px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; z-index: 2; }
.car-topview { position: absolute; bottom: 20px; left: 130px; width: 40px; height: 80px; z-index: 5; transition: left 0.05s ease-out; }

.car-body { position: absolute; width: 100%; height: 100%; background: #00f2fe; border-radius: 12px 12px 6px 6px; box-shadow: 0 0 15px rgba(0, 242, 254, 0.6); overflow: visible; }
.racing-stripes { position: absolute; left: 45%; width: 10%; height: 100%; background: #fff; opacity: 0.8; }
.car-cockpit { position: absolute; top: 30%; left: 22%; width: 56%; height: 28%; background: #070714; border-radius: 50% 50% 20% 20%; border: 1px solid #4facfe; }
.windshield { position: absolute; top: 10%; left: 15%; width: 70%; height: 40%; background: rgba(255,255,255,0.4); border-radius: 50% 50% 0 0; }

.spoiler-front-wing { position: absolute; top: -4px; left: -4px; width: 48px; height: 6px; background: #4facfe; border-radius: 2px; }

.f-l { top: 15%; left: -6px; } .f-r { top: 15%; right: -6px; }

.modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(5, 5, 15, 0.96); display: none; align-items: center; justify-content: center; z-index: 9999; }
.modal-box { background: #12122c; padding: 35px 25px; border-radius: 15px; text-align: center; color: #fff; border: 2px solid #00f2fe; max-width: 90%; width: 320px; box-shadow: 0 0 30px rgba(0, 242, 254, 0.4); }
.modal-box h3 { font-size: 26px; margin-bottom: 10px; color: #00f2fe; text-shadow: 0 0 10px #00f2fe; }
.timer { color: #ffa502; font-size: 14px; margin: 15px 0; }
.tg-redirect-btn { display: block; background: #00f2fe; color: #0a0a16; text-decoration: none; padding: 14px; border-radius: 8px; font-weight: bold; font-size: 15px; margin-top: 20px; box-shadow: 0 4px 15px rgba(0, 242, 254, 0.5); text-transform: uppercase; letter-spacing: 0.5px; }
</style>

<script>
const BOT_USERNAME = "AlexanderCryptoAl"; 
const TELEGRAM_LINK = "https://t.me/" + BOT_USERNAME;
  if (window.Telegram && window.Telegram.WebApp) { window.Telegram.WebApp.ready(); }
document.addEventListener('touchstart', function(e) { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
const car = document.getElementById('heroCar');
const raceArea = document.getElementById('raceArea');
const roadLines = document.getElementById('roadLines');
const timerText = document.getElementById('timerText');
const raceModal = document.getElementById('raceModal');
const prizeText = document.getElementById('racePrizeText');
const startScreen = document.getElementById('startScreen');
const startBtn = document.getElementById('startBtn');
const tgFinalLink = document.getElementById('tgFinalLink');

let carX = 130;
const areaWidth = 300;
const carWidth = 40; 
let timeLeft = 10.0;
let raceActive = false; 
let gameIntervals = [];
let isHoldingLeft = false;
let isHoldingRight = false;

// Нативный обработчик клика, который убирает мобильную блокировку Telegram
tgFinalLink.addEventListener('click', function(e) {
    e.preventDefault(); 
    if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData) {
        window.Telegram.WebApp.openTelegramLink(TELEGRAM_LINK);
    } else {
        window.open(TELEGRAM_LINK, '_blank');
    }
});

startBtn.addEventListener('click', function() {
  startScreen.style.display = 'none'; 
  roadLines.classList.add('moving');
  raceActive = true;                  
  runGameEngines();                   
});

function runGameEngines() {
  const moveLoop = setInterval(() => {
    if (!raceActive) return;
    if (isHoldingLeft && carX > 5) { carX -= 6; car.style.left = carX + 'px'; }
    if (isHoldingRight && carX < (areaWidth - carWidth - 5)) { carX += 6; car.style.left = carX + 'px'; }
  }, 20);
  gameIntervals.push(moveLoop);
  const timerLoop = setInterval(() => {
    if (!raceActive) return;
    timeLeft -= 0.1;
    if (timeLeft <= 0) { timeLeft = 0; endGame(true); }
    timerText.textContent = timeLeft.toFixed(1);
  }, 100);
  gameIntervals.push(timerLoop);
  const obstacleLoop = setInterval(() => { if (!raceActive) return; createObstacle(); }, 600);
  gameIntervals.push(obstacleLoop);
  const collisionLoop = setInterval(() => { if (!raceActive) return; checkCollisions(); }, 50);
  gameIntervals.push(collisionLoop);
}

function createObstacle() {
  const obs = document.createElement('div');
  obs.classList.add('obstacle');
  obs.innerHTML = '🚧'; 
  const randomX = Math.floor(Math.random() * (areaWidth - 40));
  obs.style.left = randomX + 'px'; obs.style.top = '-40px';
  raceArea.appendChild(obs);
  let obsY = -40;
  const obsMove = setInterval(() => {
    if (!raceActive) { clearInterval(obsMove); obs.remove(); return; }
    obsY += 7; obs.style.top = obsY + 'px';
    if (obsY > 400) { clearInterval(obsMove); obs.remove(); }
  }, 20);
}

function checkCollisions() {
  const obstacles = document.querySelectorAll('.obstacle');
  const carRect = car.getBoundingClientRect();
  obstacles.forEach(obs => {
    const obsRect = obs.getBoundingClientRect();
    if (!(carRect.right < obsRect.left || carRect.left > obsRect.right || carRect.bottom < obsRect.top || carRect.top > obsRect.bottom)) { endGame(false); }
  });
}

function endGame(isWin) {
  raceActive = false; roadLines.classList.remove('moving');
  gameIntervals.forEach(clearInterval); gameIntervals = [];
  if (isWin) {
    const randomBonus = Math.random() < 0.5 ? "10%" : "15%";
    prizeText.textContent = `+${randomBonus} BONUS AUF DIE ERSTE EINZAHLUNG`;
    raceModal.style.display = 'flex'; startCountdownModal();
  } else {
    alert("Du bist crashed! Versuche es noch einmal! 💥");
    document.querySelectorAll('.obstacle').forEach(o => o.remove());
    timeLeft = 10.0; timerText.textContent = '10.0'; carX = 130; car.style.left = carX + 'px';
    raceActive = true; roadLines.classList.add('moving'); runGameEngines();
  }
}

function startCountdownModal() {
  let duration = 15 * 60; const display = document.getElementById('raceCountdown');
  const modalTimer = setInterval(() => {
    let minutes = Math.floor(duration / 60); let seconds = duration % 60;
    minutes = minutes < 10 ? "0" + minutes : minutes; seconds = seconds < 10 ? "0" + seconds : seconds;
    display.textContent = minutes + ":" + seconds; if (--duration < 0) clearInterval(modalTimer);
  }, 100);
}

const leftBtn = document.getElementById('leftBtn'); const rightBtn = document.getElementById('rightBtn');
leftBtn.addEventListener('mousedown', () => isHoldingLeft = true); leftBtn.addEventListener('mouseup', () => isHoldingLeft = false);
leftBtn.addEventListener('touchstart', (e) => { e.preventDefault(); isHoldingLeft = true; }); leftBtn.addEventListener('touchend', () => isHoldingLeft = false);
rightBtn.addEventListener('mousedown', () => isHoldingRight = true); rightBtn.addEventListener('mouseup', () => isHoldingRight = false);
rightBtn.addEventListener('touchstart', (e) => { e.preventDefault(); isHoldingRight = true; }); rightBtn.addEventListener('touchend', () => isHoldingRight = false);
document.addEventListener('keydown', (e) => { if (e.key === 'ArrowLeft') isHoldingLeft = true; if (e.key === 'ArrowRight') isHoldingRight = true; });
document.addEventListener('keyup', (e) => { if (e.key === 'ArrowLeft') isHoldingLeft = false; if (e.key === 'ArrowRight') isHoldingRight = false; });
</script>
